<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FitnessSkills</title>
<style>
  /* ─── CSS Custom Properties ─────────────────────────────── */
  :root {
    --bg:        #0f1117;
    --surface:   #1a1d27;
    --surface2:  #232635;
    --border:    #2e3248;
    --text:      #e2e8f0;
    --muted:     #8892a4;
    --accent:    #7c3aed;
    --accent-dim: rgba(124,58,237,0.15);

    --t1: #27ae60;
    --t2: #2980b9;
    --t3: #e67e22;
    --t4: #8e44ad;
    --t5: #c0392b;

    --radius:    12px;
    --radius-sm: 8px;
    --transition: 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    --nav-height: 64px;
    --header-height: 56px;
  }

  /* ─── Reset & Base ──────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    height: 100%;
    overflow: hidden;
    -webkit-text-size-adjust: 100%;
  }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 16px;
    background: var(--bg);
    color: var(--text);
    height: 100%;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ─── App Shell ─────────────────────────────────────────── */
  #app {
    max-width: 430px;
    margin: 0 auto;
    height: 100%;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }

  /* ─── Screens ───────────────────────────────────────────── */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    transition: transform var(--transition), opacity var(--transition);
    will-change: transform;
    background: var(--bg);
  }

  .screen.hidden {
    pointer-events: none;
  }

  /* tabs screen */
  #screen-tabs {
    transform: translateX(0);
    opacity: 1;
  }
  #screen-tabs.slide-out {
    transform: translateX(-30%);
    opacity: 0;
  }

  /* detail screen */
  #screen-detail {
    transform: translateX(100%);
    opacity: 0;
  }
  #screen-detail.slide-in {
    transform: translateX(0);
    opacity: 1;
  }

  /* assess screen */
  #screen-assess {
    transform: translateX(100%);
    opacity: 0;
  }
  #screen-assess.slide-in {
    transform: translateX(0);
    opacity: 1;
  }

  /* ─── Headers ───────────────────────────────────────────── */
  .header {
    height: var(--header-height);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    z-index: 10;
  }

  .header-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
    flex: 1;
  }

  .back-btn {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    transition: background 0.15s, transform 0.1s;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .back-btn:active { background: var(--border); transform: scale(0.93); }

  /* ─── Scrollable Content ────────────────────────────────── */
  .scroll-content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior-y: contain;
  }

  .content-pad {
    padding: 16px;
    padding-bottom: calc(16px + var(--nav-height) + env(safe-area-inset-bottom));
  }

  .content-pad-detail {
    padding: 0 0 calc(80px + env(safe-area-inset-bottom));
  }

  /* ─── Bottom Nav ────────────────────────────────────────── */
  .bottom-nav {
    height: calc(var(--nav-height) + env(safe-area-inset-bottom));
    padding-bottom: env(safe-area-inset-bottom);
    display: flex;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: color 0.15s;
    color: var(--muted);
    position: relative;
  }

  .nav-item.active { color: var(--accent); }

  .nav-icon {
    font-size: 22px;
    line-height: 1;
    transition: transform 0.15s;
  }
  .nav-item:active .nav-icon { transform: scale(0.88); }

  .nav-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  .nav-badge {
    position: absolute;
    top: 6px;
    right: calc(50% - 14px);
    background: #e74c3c;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    min-width: 16px;
    height: 16px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
  }

  /* ─── Tab Panels ────────────────────────────────────────── */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ─── Stats Bar ─────────────────────────────────────────── */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
  }

  .stat-card {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 12px;
    text-align: center;
  }

  .stat-value {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -1px;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  /* ─── Progress Ring ─────────────────────────────────────── */
  .progress-ring-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
  }

  .ring-labels {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .ring-label-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
  }

  .ring-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .ring-center-text {
    font-size: 28px;
    font-weight: 800;
    fill: var(--text);
    dominant-baseline: middle;
    text-anchor: middle;
  }

  .ring-center-sub {
    font-size: 11px;
    fill: var(--muted);
    dominant-baseline: middle;
    text-anchor: middle;
    font-weight: 600;
  }

  /* ─── Section Headers ───────────────────────────────────── */
  .section-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 12px;
    margin-top: 4px;
  }

  .section-title {
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--muted);
  }

  .section-count {
    font-size: 12px;
    color: var(--muted);
    opacity: 0.7;
  }

  /* ─── Attention Chips ───────────────────────────────────── */
  .attention-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 8px;
    margin-bottom: 20px;
    scrollbar-width: none;
  }
  .attention-scroll::-webkit-scrollbar { display: none; }

  .attention-row {
    display: flex;
    gap: 10px;
    width: max-content;
  }

  .attention-chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s, transform 0.1s;
    min-width: 88px;
  }

  .attention-chip:active { background: var(--surface2); transform: scale(0.96); }

  .attention-chip.overdue { border-color: #e74c3c44; }

  .chip-icon { font-size: 24px; }
  .chip-name {
    font-size: 11px;
    font-weight: 600;
    text-align: center;
    color: var(--text);
    line-height: 1.3;
    max-width: 72px;
  }
  .chip-days {
    font-size: 10px;
    color: #e74c3c;
    font-weight: 700;
  }
  .chip-days.never { color: var(--muted); }

  .all-good {
    background: rgba(39,174,96,0.1);
    border: 1px solid rgba(39,174,96,0.3);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
    color: var(--t1);
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 20px;
  }

  /* ─── Tier Groups ───────────────────────────────────────── */
  .tier-group { margin-bottom: 24px; }

  .tier-group-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .tier-divider {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ─── Skill Cards ───────────────────────────────────────── */
  .skill-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s, transform 0.1s, border-color 0.15s;
    margin-bottom: 8px;
  }

  .skill-card:active { background: var(--surface2); transform: scale(0.985); }

  .skill-card.needs-attention { border-color: rgba(231,76,60,0.35); }

  .skill-icon { font-size: 28px; flex-shrink: 0; }

  .skill-card-body { flex: 1; min-width: 0; }

  .skill-card-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .skill-name {
    font-size: 15px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .skill-card-bottom {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .level-dots {
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.2s;
  }

  .dot.filled { background: var(--t1); }
  .dot.current {
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--t1);
  }

  .days-ago {
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
    flex-shrink: 0;
  }

  .days-ago.overdue { color: #e74c3c; font-weight: 600; }

  /* ─── Tier Badge ────────────────────────────────────────── */
  .tier-badge {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 20px;
    color: #fff;
    flex-shrink: 0;
  }

  /* ─── Filter Pills ──────────────────────────────────────── */
  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .filter-row::-webkit-scrollbar { display: none; }

  .filter-pill {
    padding: 7px 16px;
    border-radius: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .filter-pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .filter-pill:active { opacity: 0.8; }

  /* ─── History Tab ───────────────────────────────────────── */
  .history-date-group { margin-bottom: 20px; }

  .history-date-sep {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    padding-left: 2px;
  }

  .history-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 6px;
  }

  .history-icon { font-size: 22px; flex-shrink: 0; }

  .history-body { flex: 1; min-width: 0; }

  .history-skill-name {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 2px;
  }

  .history-note {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .level-badge {
    font-size: 12px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    flex-shrink: 0;
  }

  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 60px 20px;
  }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; line-height: 1.5; }

  /* ─── Detail Screen ─────────────────────────────────────── */
  .detail-hero {
    padding: 24px 16px 20px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
    position: relative;
    overflow: hidden;
  }

  .detail-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.12;
  }

  .detail-hero-top {
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    z-index: 1;
  }

  .detail-icon { font-size: 36px; }

  .detail-hero-labels { display: flex; flex-direction: column; gap: 4px; }

  .detail-skill-name {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    position: relative;
    z-index: 1;
  }

  .detail-track {
    font-size: 12px;
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .tip-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    margin: 0 16px;
  }

  .tip-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

  .tip-text {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.55;
  }

  .detail-stats-row {
    display: flex;
    gap: 10px;
    padding: 16px 16px 0;
  }

  .detail-stat {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    text-align: center;
  }

  .detail-stat-value {
    font-size: 20px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }

  .detail-stat-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    font-weight: 600;
  }

  /* ─── Sparkline ─────────────────────────────────────────── */
  .sparkline-wrap {
    margin: 16px 16px 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px 10px;
  }

  .sparkline-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }

  .sparkline-empty {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    padding: 16px 0;
  }

  /* ─── Ladder ────────────────────────────────────────────── */
  .ladder-section {
    padding: 16px;
  }

  .ladder-section-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 12px;
  }

  .ladder-item {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    margin-bottom: 8px;
    border-radius: var(--radius-sm);
    padding: 12px;
    border: 1px solid transparent;
    transition: all 0.2s;
  }

  .ladder-item.achieved {
    background: rgba(39,174,96,0.07);
    border-color: rgba(39,174,96,0.2);
  }

  .ladder-item.current-level {
    background: rgba(39,174,96,0.12);
    border-color: rgba(39,174,96,0.45);
    box-shadow: 0 0 0 1px rgba(39,174,96,0.2);
  }

  .ladder-item.future {
    opacity: 0.5;
  }

  .ladder-num {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 800;
    flex-shrink: 0;
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .ladder-item.achieved .ladder-num,
  .ladder-item.current-level .ladder-num {
    background: var(--t1);
    color: #fff;
    border-color: var(--t1);
  }

  .ladder-body { flex: 1; }

  .ladder-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 3px;
  }

  .ladder-item.future .ladder-name { color: var(--muted); }

  .ladder-criteria {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.4;
  }

  .current-marker {
    font-size: 10px;
    font-weight: 700;
    color: var(--t1);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 4px;
  }

  /* ─── History in Detail ─────────────────────────────────── */
  .detail-history {
    padding: 0 16px 16px;
  }

  .detail-history-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 10px;
  }

  .mini-history-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    margin-bottom: 6px;
  }

  .mini-hist-date {
    font-size: 12px;
    color: var(--muted);
    flex: 1;
  }

  .mini-hist-note {
    font-size: 12px;
    color: var(--muted);
    flex: 2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-align: right;
  }

  /* ─── Sticky Assess Button ──────────────────────────────── */
  .sticky-assess {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 12px 16px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
    background: linear-gradient(transparent, var(--bg) 20%);
  }

  .btn-primary {
    display: block;
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    text-align: center;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s, transform 0.1s, opacity 0.15s;
    letter-spacing: -0.2px;
  }

  .btn-primary:active { background: #6d28d9; transform: scale(0.98); }

  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  /* ─── Assess Screen ─────────────────────────────────────── */
  .assess-header-info {
    padding: 16px;
    padding-bottom: 0;
  }

  .assess-skill-title {
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 4px;
  }

  .assess-subtitle {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 16px;
  }

  .assess-levels {
    padding: 0 16px;
  }

  .assess-level-item {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 14px;
    border-radius: var(--radius);
    border: 2px solid var(--border);
    margin-bottom: 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.2s;
    background: var(--surface);
  }

  .assess-level-item:active { transform: scale(0.98); }

  .assess-level-item.selected {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .assess-level-item.below-selected {
    border-color: rgba(39,174,96,0.35);
    background: rgba(39,174,96,0.06);
  }

  .assess-level-num {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 800;
    flex-shrink: 0;

/* ════════════════════════════════════════════════════════════
   CONSTANTS & HELPERS
════════════════════════════════════════════════════════════ */
const TIER_COLORS = { 1: '#27ae60', 2: '#2980b9', 3: '#e67e22', 4: '#8e44ad', 5: '#c0392b' };
const TIER_NAMES  = { 1: 'T1 Foundation', 2: 'T2 Strength', 3: 'T3 Skill', 4: 'T4 Advanced', 5: 'T5 Elite' };
const TRACK_ICONS = { pull: '🏋️', push: '💪', leg: '🦵', core: '⚡' };
const STORAGE_KEY = 'fs_progress';
const ATTENTION_DAYS = 14;

function loadProgress() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch { return {}; }
}

function saveProgress(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function getSkillHistory(skillId) {
  const data = loadProgress();
  return (data[skillId] || []).slice().sort((a, b) => b.date.localeCompare(a.date));
}

function getLatestEntry(skillId) {
  const h = getSkillHistory(skillId);
  return h.length > 0 ? h[0] : null;
}

function getCurrentLevel(skillId) {
  const e = getLatestEntry(skillId);
  return e ? e.level : null;
}

function daysSince(dateStr) {
  if (!dateStr) return null;
  const then = new Date(dateStr + 'T00:00:00');
  const now  = new Date();
  return Math.floor((now - then) / 86400000);
}

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function formatDateShort(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function needsAttention(skillId) {
  const e = getLatestEntry(skillId);
  if (!e) return true;
  const days = daysSince(e.date);
  return days !== null && days >= ATTENTION_DAYS;
}

function tierColor(tier) { return TIER_COLORS[tier] || '#888'; }

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ════════════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════════════ */
let state = {
  view: 'tabs',
  tab: 'home',
  skillId: null,
  assessLevel: null,
  filterTrack: 'all',
};

/* ════════════════════════════════════════════════════════════
   NAVIGATION
════════════════════════════════════════════════════════════ */
function switchTab(tab) {
  state.tab = tab;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tab);
  });
  document.querySelectorAll('.tab-panel').forEach(el => {
    el.classList.toggle('active', el.id === 'panel-' + tab);
  });
  const titles = { home: 'FitnessSkills', skills: 'Skills', history: 'History' };
  document.getElementById('tab-title').textContent = titles[tab];
  renderTab(tab);
}

function openDetail(skillId) {
  state.skillId = skillId;
  state.view = 'detail';
  const skill = SKILLS.find(s => s.id === skillId);
  document.getElementById('detail-header-title').textContent = skill ? skill.name : '';
  renderDetail();
  showScreen('detail');
}

function openAssess() {
  state.view = 'assess';
  state.assessLevel = getCurrentLevel(state.skillId);
  renderAssess();
  showScreen('assess');
}

function goBack() {
  state.view = 'tabs';
  showScreen('tabs');
  renderTab(state.tab);
}

function goBackFromAssess() {
  state.view = 'detail';
  showScreen('detail');
}

function showScreen(which) {
  const tabs   = document.getElementById('screen-tabs');
  const detail = document.getElementById('screen-detail');
  const assess = document.getElementById('screen-assess');

  // Reset all
  tabs.classList.remove('slide-out');
  detail.classList.remove('slide-in');
  assess.classList.remove('slide-in');
  tabs.classList.remove('hidden');
  detail.classList.remove('hidden');
  assess.classList.remove('hidden');

  if (which === 'tabs') {
    detail.classList.add('hidden');
    assess.classList.add('hidden');
  } else if (which === 'detail') {
    tabs.classList.add('slide-out');
    tabs.classList.add('hidden');
    assess.classList.add('hidden');
    detail.classList.add('slide-in');
    // Scroll to top
    const sc = detail.querySelector('.scroll-content');
    if (sc) sc.scrollTop = 0;
  } else if (which === 'assess') {
    tabs.classList.add('hidden');
    detail.classList.add('hidden');
    assess.classList.add('slide-in');
    const sc = assess.querySelector('.scroll-content');
    if (sc) sc.scrollTop = 0;
  }
}

/* ════════════════════════════════════════════════════════════
   RENDER HELPERS
════════════════════════════════════════════════════════════ */
function renderTierBadge(tier) {
  const c = tierColor(tier);
  const n = TIER_NAMES[tier] || ('T' + tier);
  return `<span class="tier-badge" style="background:${c}">${esc(n)}</span>`;
}

function renderLevelDots(currentLevel) {
  let html = '<div class="level-dots">';
  for (let i = 0; i < 6; i++) {
    let cls = 'dot';
    if (currentLevel !== null && i < currentLevel) cls += ' filled';
    html += `<div class="${cls}"></div>`;
  }
  html += '</div>';
  return html;
}

function renderDaysAgo(skillId) {
  const e = getLatestEntry(skillId);
  if (!e) return `<span class="days-ago never">Never assessed</span>`;
  const d = daysSince(e.date);
  if (d === 0) return `<span class="days-ago">Today</span>`;
  if (d === 1) return `<span class="days-ago">Yesterday</span>`;
  const cls = d >= ATTENTION_DAYS ? 'days-ago overdue' : 'days-ago';
  return `<span class="${cls}">${d}d ago</span>`;
}

function renderSkillCard(skill) {
  const level = getCurrentLevel(skill.id);
  const attention = needsAttention(skill.id);
  const tc = tierColor(skill.tier);
  return `
    <div class="skill-card${attention ? ' needs-attention' : ''}" onclick="openDetail('${skill.id}')">
      <div class="skill-icon">${skill.icon}</div>
      <div class="skill-card-body">
        <div class="skill-card-top">
          <div class="skill-name">${esc(skill.name)}</div>
          ${renderTierBadge(skill.tier)}
        </div>
        <div class="skill-card-bottom">
          ${renderLevelDots(level)}
          <span style="font-size:11px;color:var(--muted);margin-left:6px;">${level !== null ? level + '/5' : '—'}</span>
          ${renderDaysAgo(skill.id)}
        </div>
      </div>
    </div>
  `;
}

  // Stats

    </div>
    <div class="stat-card">
      <div class="stat-value">${pct}%</div>
      <div class="stat-label">Progress</div>
    </div>
  </div>`;

  // Ring
  const r = 54, cx = 70, cy = 70;
  const circ = 2 * Math.PI * r;
  const dash = (totalLevels / maxLevels) * circ;
  html += `
  <div class="progress-ring-wrap">
    <svg width="140" height="140" viewBox="0 0 140 140">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--border)" stroke-width="10"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none"
        stroke="var(--accent)" stroke-width="10"
        stroke-linecap="round"
        stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}"
        stroke-dashoffset="${(circ / 4).toFixed(1)}"
        transform="rotate(-90 ${cx} ${cy})"
        style="transition: stroke-dasharray 0.6s ease;"/>
      <text x="${cx}" y="${cy - 8}" class="ring-center-text">${totalLevels}</text>
      <text x="${cx}" y="${cy + 14}" class="ring-center-sub">of ${maxLevels} pts</text>
    </svg>
    <div class="ring-labels">
      <div class="ring-label-row"><div class="ring-dot" style="background:var(--accent)"></div>${assessed}/${total} assessed</div>
      <div class="ring-label-row"><div class="ring-dot" style="background:var(--t1)"></div>${mastered} mastered</div>
      <div class="ring-label-row"><div class="ring-dot" style="background:var(--t3)"></div>${attentionSkills.length} need attention</div>
    </div>
  </div>`;

  // Needs Attention
  html += `<div class="section-header">
    <div class="section-title">Needs Attention</div>
    <div class="section-count">${attentionSkills.length} skills</div>
  </div>`;

  if (attentionSkills.length === 0) {
    html += `<div class="all-good">✓ All skills assessed within 14 days!</div>`;
  } else {
    html += `<div class="attention-scroll"><div class="attention-row">`;
    attentionSkills.forEach(s => {
      const e = getLatestEntry(s.id);
      let daysHtml = '';
      if (!e) {
        daysHtml = `<div class="chip-days never">Never</div>`;
      } else {
        const d = daysSince(e.date);
        daysHtml = `<div class="chip-days">${d}d ago</div>`;
      }
      html += `
        <div class="attention-chip overdue" onclick="openDetail('${s.id}')">
          <div class="chip-icon">${s.icon}</div>
          <div class="chip-name">${esc(s.name)}</div>
          ${daysHtml}
        </div>`;
    });
    html += `</div></div>`;
  }

  // All Skills by Tier
  html += `<div class="section-header"><div class="section-title">All Skills</div></div>`;

  const tiers = [1, 2, 3, 4, 5];
  tiers.forEach(tier => {
    const tierSkills = SKILLS.filter(s => s.tier === tier);
    if (!tierSkills.length) return;
    const c = tierColor(tier);
    html += `<div class="tier-group">
      <div class="tier-group-header">
        <span style="font-size:12px;font-weight:800;color:${c};text-transform:uppercase;letter-spacing:0.5px;">${TIER_NAMES[tier]}</span>
        <div class="tier-divider"></div>
      </div>`;
    tierSkills.forEach(s => { html += renderSkillCard(s); });
    html += `</div>`;
  });

  document.getElementById('panel-home').innerHTML = html;
  updateAttentionBadge(attentionSkills.length);
}

function updateAttentionBadge(count) {
  const badge = document.getElementById('attention-badge');
  if (count > 0) {
    badge.textContent = count;
    badge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
  }
}

/* ════════════════════════════════════════════════════════════
   TAB: SKILLS
════════════════════════════════════════════════════════════ */
function renderSkills() {
  const tracks = ['all', 'pull', 'push', 'leg', 'core'];
  let html = `<div class="filter-row">`;
  tracks.forEach(t => {
    const label = t === 'all' ? 'All' : (TRACK_ICONS[t] + ' ' + t.charAt(0).toUpperCase() + t.slice(1));
    html += `<div class="filter-pill${state.filterTrack === t ? ' active' : ''}" onclick="setFilter('${t}')">${label}</div>`;
  });
  html += `</div>`;

  const filtered = state.filterTrack === 'all'
    ? SKILLS
    : SKILLS.filter(s => s.track === state.filterTrack);

  if (filtered.length === 0) {
    html += `<div class="empty-state"><div class="empty-icon">🔍</div><p>No skills in this category.</p></div>`;
  } else {
    filtered.forEach(s => { html += renderSkillCard(s); });
  }

  html += `<div style="text-align:center;padding-top:16px;">
    <a href="index.html" style="color:var(--muted);font-size:12px;text-decoration:none;">ℹ️ See dependency graph</a>
  </div>`;

  document.getElementById('panel-skills').innerHTML = html;
}

function setFilter(track) {
  state.filterTrack = track;
  renderSkills();
}

/* ════════════════════════════════════════════════════════════
   TAB: HISTORY
════════════════════════════════════════════════════════════ */
function renderHistory() {
  const progress = loadProgress();
  let allEntries = [];

  SKILLS.forEach(skill => {
    (progress[skill.id] || []).forEach(entry => {
      allEntries.push({ ...entry, skill });
    });
  });

  allEntries.sort((a, b) => b.date.localeCompare(a.date) || 0);

  let html = '';

  if (allEntries.length === 0) {
    html = `<div class="empty-state">
      <div class="empty-icon">📋</div>
      <p>No assessments yet.<br>Tap any skill to log your first!</p>
    </div>`;
    document.getElementById('panel-history').innerHTML = html;
    return;
  }

  // Group by date
  const groups = {};
  allEntries.forEach(e => {
    if (!groups[e.date]) groups[e.date] = [];
    groups[e.date].push(e);
  });

  Object.keys(groups).sort((a, b) => b.localeCompare(a)).forEach(date => {
    html += `<div class="history-date-group">
      <div class="history-date-sep">${formatDate(date)}</div>`;
    groups[date].forEach(e => {
      const levelName = e.skill.levels[e.level] ? e.skill.levels[e.level].name : 'Level ' + e.level;
      html += `
        <div class="history-entry" onclick="openDetail('${e.skill.id}')">
          <div class="history-icon">${e.skill.icon}</div>
          <div class="history-body">
            <div class="history-skill-name">${esc(e.skill.name)}</div>
            ${e.note ? `<div class="history-note">${esc(e.note)}</div>` : ''}
          </div>
          <div class="level-badge">${e.level}/5</div>
        </div>`;
    });
    html += `</div>`;
  });

  document.getElementById('panel-history').innerHTML = html;
}

/* ════════════════════════════════════════════════════════════
   DETAIL VIEW
════════════════════════════════════════════════════════════ */
function renderDetail() {
  const skill = SKILLS.find(s => s.id === state.skillId);
  if (!skill) return;

  const level = getCurrentLevel(skill.id);
  const history = getSkillHistory(skill.id);
  const tc = tierColor(skill.tier);

  // Hero gradient
  let html = `
    <div class="detail-hero" style="background: linear-gradient(135deg, ${tc}22 0%, transparent 60%);">
      <div class="detail-hero-top">
        <div class="detail-icon">${skill.icon}</div>
        <div class="detail-hero-labels">
          ${renderTierBadge(skill.tier)}
          <div class="detail-track">${TRACK_ICONS[skill.track]} ${skill.track.charAt(0).toUpperCase() + skill.track.slice(1)}</div>
        </div>
      </div>
      <div class="detail-skill-name">${esc(skill.name)}</div>
    </div>`;

  // Tip
  html += `
    <div class="tip-box">
      <div class="tip-icon">💡</div>
      <div class="tip-text">${esc(skill.tip)}</div>
    </div>`;

  // Stats row
  const lastEntry = getLatestEntry(skill.id);
  let lastAssessedText = 'Never';
  if (lastEntry) {
    const d = daysSince(lastEntry.date);
    if (d === 0) lastAssessedText = 'Today';
    else if (d === 1) lastAssessedText = 'Yesterday';
    else lastAssessedText = d + ' days ago';
  }

  html += `
    <div class="detail-stats-row">
      <div class="detail-stat">
        <div class="detail-stat-value">${level !== null ? level + '/5' : '—'}</div>
        <div class="detail-stat-label">Current Level</div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-value" style="font-size:14px;padding-top:3px;">${esc(lastAssessedText)}</div>
        <div class="detail-stat-label">Last Assessed</div>
      </div>
      <div class="detail-stat">
        <div class="detail-stat-value">${history.length}</div>
        <div class="detail-stat-label">Entries</div>
      </div>
    </div>`;

  // Sparkline
  html += renderSparkline(skill, history);

  // Ladder
  html += `<div class="ladder-section">
    <div class="ladder-section-title">Regression Ladder</div>`;

  skill.levels.forEach((lv, i) => {
    const lvNum = i + 1; // display as 1-based
    let cls = 'ladder-item';
    if (level !== null) {
      if (i < level) cls += ' achieved';
      if (i === level - 1) cls += ' current-level'; // overrides achieved visually
      if (level !== null && i >= level) cls += ' future';
    } else {
      cls += ' future';
    }
    // Fix: current-level should be the topmost achieved level
    // level is 0-5. level 0 = not started. level 1 = first level done.
    // So index i corresponds to level i+1.
    // Current = i === level-1 (0-indexed), achieved = i < level-1
    const isCurrent = level !== null && i === level - 1;
    const isAchieved = level !== null && i < level - 1;
    const isFuture   = level === null || i >= level;

    let itemCls = 'ladder-item';
    if (isCurrent)       itemCls += ' current-level';
    else if (isAchieved) itemCls += ' achieved';
    else if (isFuture)   itemCls += ' future';

    html += `<div class="${itemCls}">
      <div class="ladder-num">${lvNum}</div>
      <div class="ladder-body">
        <div class="ladder-name">${esc(lv.name)}</div>
        <div class="ladder-criteria">${esc(lv.criteria)}</div>
        ${isCurrent ? '<div class="current-marker">▶ Current Level</div>' : ''}
      </div>
    </div>`;
  });

  html += `</div>`;

  // History (last 5)
  if (history.length > 0) {
    html += `<div class="detail-history">
      <div class="detail-history-title">Recent History</div>`;
    history.slice(0, 5).forEach(e => {
      html += `<div class="mini-history-item">
        <div class="level-badge" style="background:${tc}22;border-color:${tc}44;color:${tc};">${e.level}/5</div>
        <div class="mini-hist-date">${formatDate(e.date)}</div>
        <div class="mini-hist-note">${e.note ? esc(e.note) : ''}</div>
      </div>`;
    });
    html += `</div>`;
  }

  document.getElementById('detail-content').innerHTML = html;
}

function renderSparkline(skill, history) {
  const data = history.slice(0, 8).reverse(); // oldest first

  if (data.length < 2) {
    return `<div class="sparkline-wrap">
      <div class="sparkline-title">Progress Chart</div>
      <div class="sparkline-empty">Not enough data yet — assess at least twice to see a chart.</div>
    </div>`;
  }

  const W = 320, H = 80;
  const padL = 20, padR = 10, padT = 8, padB = 20;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;

  const tc = tierColor(skill.tier);

  const xStep = innerW / (data.length - 1);
  const points = data.map((d, i) => ({
    x: padL + i * xStep,
    y: padT + innerH - (d.level / 5) * innerH,
  }));

  // Build smooth polyline
  let polyline = points.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');

  // Area fill path
  let areaPath = `M ${points[0].x.toFixed(1)},${points[0].y.toFixed(1)}`;
  points.slice(1).forEach(p => { areaPath += ` L ${p.x.toFixed(1)},${p.y.toFixed(1)}`; });
  areaPath += ` L ${points[points.length-1].x.toFixed(1)},${(padT + innerH).toFixed(1)} L ${points[0].x.toFixed(1)},${(padT + innerH).toFixed(1)} Z`;

  // Y-axis labels
  const yLabels = [0,1,2,3,4,5].map(v => ({
    v,
    y: padT + innerH - (v / 5) * innerH,
  }));

  let svg = `<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs>
      <linearGradient id="spark-grad-${skill.id}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${tc}" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="${tc}" stop-opacity="0.02"/>
      </linearGradient>
    </defs>`;

  // Grid lines
  [1,2,3,4,5].forEach(v => {
    const y = padT + innerH - (v / 5) * innerH;
    svg += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W - padR}" y2="${y.toFixed(1)}"
      stroke="var(--border)" stroke-width="0.5" stroke-dasharray="3,3"/>`;
  });

  // Y labels
  [0,5].forEach(v => {
    const y = padT + innerH - (v / 5) * innerH;
    svg += `<text x="${padL - 4}" y="${y + 4}" font-size="8" fill="var(--muted)" text-anchor="end">${v}</text>`;
  });

  // Area
  svg += `<path d="${areaPath}" fill="url(#spark-grad-${skill.id})"/>`;

  // Line
  svg += `<polyline points="${polyline}" fill="none" stroke="${tc}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;

  // Points
  points.forEach((p, i) => {
    svg += `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" fill="${tc}" stroke="var(--surface)" stroke-width="1.5"/>`;
  });

  // X labels (first and last date)
  svg += `<text x="${points[0].x.toFixed(1)}" y="${H - 4}" font-size="8" fill="var(--muted)" text-anchor="start">${formatDateShort(data[0].date)}</text>`;
  svg += `<text x="${points[points.length-1].x.toFixed(1)}" y="${H - 4}" font-size="8" fill="var(--muted)" text-anchor="end">${formatDateShort(data[data.length-1].date)}</text>`;

  svg += `</svg>`;

  return `<div class="sparkline-wrap">
    <div class="sparkline-title">Progress Chart — Last ${data.length} Assessments</div>
    ${svg}
  </div>`;
}

/* ════════════════════════════════════════════════════════════
   ASSESS VIEW
════════════════════════════════════════════════════════════ */
function renderAssess() {
  const skill = SKILLS.find(s => s.id === state.skillId);
  if (!skill) return;

  const selectedLevel = state.assessLevel; // null or 0-5

  let html = `<div class="assess-header-info">
    <div class="assess-skill-title">${esc(skill.name)}</div>
    <div class="assess-subtitle">Tap the highest level you can currently do consistently.</div>
  </div>
  <div class="assess-levels">`;

  skill.levels.forEach((lv, i) => {
    const lvNum = i + 1; // 1-based display
    const lvVal = i + 1; // stored value (1-5) — but wait, spec says level 0-5
    // Level 0 = not started. Levels 1-5 = ladder steps.
    // So tapping level row i (0-indexed) sets level = i+1? No.
    // Looking at data model: level 0 = "Cannot do" (first row), level 5 = mastered (6th row)
    // But spec says: Level is 0–5 per skill. 0 = not started / base requirement not met. 5 = mastered.
    // And there are 6 levels (indices 0-5) in the ladder.
    // So: tapping row index i sets level = i (0-5). Row 0 = level 0, row 5 = level 5.
    const lvValue = i; // 0-indexed as stored level

    let cls = 'assess-level-item';
    if (selectedLevel !== null && lvValue === selectedLevel) cls += ' selected';
    else if (selectedLevel !== null && lvValue < selectedLevel) cls += ' below-selected';

    html += `<div class="${cls}" onclick="selectLevel(${lvValue})">
      <div class="assess-level-num">${lvNum}</div>
      <div class="assess-level-body">
        <div class="assess-level-name">${esc(lv.name)}</div>
        <div class="assess-level-criteria">${esc(lv.criteria)}</div>
      </div>
    </div>`;
  });

  html += `</div>
  <div class="note-section">
    <div class="note-label">Note (optional)</div>
    <textarea class="note-input" id="assess-note" placeholder="e.g. felt strong, need more work on..." rows="3"></textarea>
  </div>
  <div class="save-section">
    <button class="btn-primary" id="save-btn" onclick="saveAssessment()" ${selectedLevel === null ? 'disabled' : ''}>
      Save Assessment
    </button>
  </div>`;

  document.getElementById('assess-content').innerHTML = html;

  // Restore note if any
  const lastEntry = getLatestEntry(skill.id);
  // Don't restore note from last entry — fresh note each time
}

function selectLevel(lvValue) {
  state.assessLevel = lvValue;

  // Animate items
  const items = document.querySelectorAll('.assess-level-item');
  items.forEach((item, i) => {
    item.classList.remove('selected', 'below-selected');
    if (i === lvValue) item.classList.add('selected');
    else if (i < lvValue) item.classList.add('below-selected');
  });

  // Animate num circles
  document.querySelectorAll('.assess-level-num').forEach((num, i) => {
    // styling is handled via parent class
  });

  const btn = document.getElementById('save-btn');
  if (btn) btn.disabled = false;
}

function saveAssessment() {
  if (state.assessLevel === null) return;

  const note = (document.getElementById('assess-note')?.value || '').trim();
  const progress = loadProgress();
  if (!progress[state.skillId]) progress[state.skillId] = [];

  progress[state.skillId].push({
    date: todayStr(),
    level: state.assessLevel,
    note: note || undefined,
  });

  saveProgress(progress);

  // Navigate back to detail
  state.view = 'detail';
  renderDetail();
  showScreen('detail');
}

/* ════════════════════════════════════════════════════════════
   TAB RENDERING DISPATCHER
════════════════════════════════════════════════════════════ */
function renderTab(tab) {
  if (tab === 'home')    renderHome();
  if (tab === 'skills')  renderSkills();
  if (tab === 'history') renderHistory();
}

/* ════════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════════ */
function init() {
  // Set initial active panel
  document.getElementById('panel-home').classList.add('active');
  renderHome();
  showScreen('tabs');
}

document.addEventListener('DOMContentLoaded', init);
</script>
